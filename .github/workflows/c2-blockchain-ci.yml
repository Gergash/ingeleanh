name: c2-blockchain CI

on:
  push:
    branches: [master, main]
    paths:
      - 'c2-blockchain/**'
      - '.github/workflows/c2-blockchain-ci.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'c2-blockchain/**'
      - '.github/workflows/c2-blockchain-ci.yml'

defaults:
  run:
    working-directory: c2-blockchain

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Test Go (race + cover, packages with tests only)
        run: |
          PKGS=$(go list -f '{{if .TestGoFiles}}{{printf "%s" .ImportPath}}{{end}}' ./...)
          go test -race -coverprofile=coverage.out -covermode=atomic $PKGS

  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
        working-directory: c2-blockchain/contracts
      - run: npx hardhat test
        working-directory: c2-blockchain/contracts
