services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: proteccion_datos
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d proteccion_datos"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_dev_password} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://app_user:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/proteccion_datos
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api_gateway:
    build:
      context: ./api_gateway
      dockerfile: Dockerfile
    environment:
      AI_SERVICE_URL: http://ai_service:8000
      DATABASE_URL: postgresql://app_user:${POSTGRES_PASSWORD:-dev_password_change_me}@postgres:5432/proteccion_datos
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis:6379/1
      FRONTEND_URL: http://localhost:3000
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - redis
      - ai_service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway

volumes:
  postgres_data:
  redis_data:
  minio_data:
